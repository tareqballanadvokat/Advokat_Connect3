name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'OWA/Outlook-Web-Add-In/Version Manifest XML/package-lock.json'

      - name: Install dependencies
        working-directory: 'OWA/Outlook-Web-Add-In/Version Manifest XML'
        run: npm ci

      - name: Build
        working-directory: 'OWA/Outlook-Web-Add-In/Version Manifest XML'
        run: npm run build
        env:
          SIP_WS_URI: ${{ secrets.SIP_WS_URI }}
          DEVEXTREME_LICENSE_KEY: ${{ secrets.DEVEXTREME_LICENSE_KEY }}
          TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          TURN_CREDENTIAL: ${{ secrets.TURN_CREDENTIAL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_SEA_08A52E81E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "OWA/Outlook-Web-Add-In/Version Manifest XML"
          output_location: "dist"
          skip_app_build: true
