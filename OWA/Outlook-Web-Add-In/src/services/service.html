<!-- This file shows how to design a first-run page that provides a welcome screen to the user about the features of the add-in. -->

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Service Task Pane Add-in</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- For more information on Fluent UI, visit https://developer.microsoft.com/fluentui#/. -->
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- Template styles -->
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link href="service.css" rel="stylesheet" type="text/css" />

    <script>
        function openCity(cityName) {
          var i;
          var x = document.getElementsByClassName("city");
          for (i = 0; i < x.length; i++) {
            x[i].style.display = "none";  
          }
          document.getElementById(cityName).style.display = "block";  
        }
        </script>

</head>


<body> 
<div class="w3-bar w3-black">
    <div class="w3-bar-item w3-button" onclick="openCity('ASD')">ASD</div>
    <div class="w3-bar-item w3-button" onclick="openCity('Service')">Servie</div>
    <div class="w3-bar-item w3-button" onclick="openCity('Case')">Case</div>
  </div>
  
  <div id="ASD" class="w3-container city">
 
    <header class="ms-welcome__header ms-bgColor-neutralLighter">
        <img width="10" height="10" src="../../assets/logo-filled.png" alt="Advokat" title="Advokat" />
        <h1 class="ms-font-su">Service</h1>
    </header>
  
    <main id="app-body"  style="display: none;">
        
        <p class="ms-font-l">Modify the source files, then click <b>Run</b>.</p>
        <div role="button" id="uniqueId" class="ms-welcome__action ms-Button ms-Button--hero ms-font-xl">
            <span class="ms-Button-label">Get Unique Id</span>
        </div>
        <div role="button" id="uniqueId2" class="ms-welcome__action ms-Button ms-Button--hero ms-font-xl">
            <span class="ms-Button-label">Get Unique Id - InternetHeader</span>
        </div>
        <div role="button" id="downloadId" class="ms-welcome__action ms-Button ms-Button--hero ms-font-xl">
            <span class="ms-Button-label">Download File</span>
        </div>
        <p><label id="item-subject"></label></p>
    </main>
  </div>
  
  <div id="Service" class="w3-container city" style="display:none">
    <h2>Paris</h2>
    <p>Paris is the capital of France.</p> 
  </div>
  
  <div id="Case" class="w3-container city" style="display:none">     
      <div role="button" id="caseStructureDownloaded"  >
            <span class="ms-Button">Download Case Structure</span>
        </div>
    <div class="cases-container" id="caseStructure">
        <h3>Cases ★</h3>
    </div>
  </div>
       
    
      
    
 
 
    
 














</body>

</html>
