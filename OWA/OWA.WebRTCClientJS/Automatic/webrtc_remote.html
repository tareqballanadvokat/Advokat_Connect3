<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Remote</title>
</head>
<body>

    <h2>🌐 WebRTC Remote</h2>
    <h3>💬 Chat</h3>
    <input type="text" id="messageInput" placeholder="Wpisz wiadomość...">
    <button onclick="sendMessage()">Wyślij</button>

    <h3>📩 Odebrane wiadomości:</h3>
    <textarea id="chatMessages" readonly></textarea>

    <h3>📡 Status:</h3>
    <div id="status">🟡 Oczekiwanie...</div>

    <script>
        const socket = new WebSocket("ws://92.205.233.81:8081");
        const remoteId = "remote";

        let iceCandidateQueue = []; // Kolejka ICE Candidates

        socket.onopen = () => {
            socket.send(JSON.stringify({ type: "register", id: remoteId }));
            console.log("📡 [Remote] Zarejestrowano w serwerze sygnalizacyjnym.");
        };

        let peerConnection = new RTCPeerConnection({
           iceServers: [
               { urls: "stun:stun.l.google.com:19302" },
               { urls: "stun:stun1.l.google.com:19302" },
               { urls: "stun:stun2.l.google.com:19302" },
               { urls: 'stun:freestun.net:3478' }, 
               { urls: 'turn:freestun.net:3478', username: 'free', credential: 'free' }
           ]
        });

        socket.onmessage = async (event) => {
            let data = JSON.parse(event.data);
            console.log("📩 [Remote] Odebrano:", data);

            if (data.type === "offer") {
                console.log("✅ [Remote] Ustawiam Remote Description (Offer).");
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                await createAnswer();

                // Dodaj zaległe ICE Candidates
                iceCandidateQueue.forEach(async candidate => {
                    console.log("➡️ [Remote] Dodaję opóźniony ICE Candidate:", candidate);
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                });
                iceCandidateQueue = []; // Wyczyść kolejkę
            } else if (data.type === "candidate") {
                if (peerConnection.remoteDescription) {
                    console.log("➡️ [Remote] Dodaję ICE Candidate:", data.candidate);
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } else {
                    console.log("⏳ [Remote] Remote Description nie jest jeszcze ustawione. Odkładam ICE do kolejki.");
                    iceCandidateQueue.push(data.candidate);
                }
            }
        };

        async function createAnswer() {
            let answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            console.log("📡 [Remote] Wysyłam Answer:", answer);

            socket.send(JSON.stringify({ type: "answer", target: "caller", answer }));
        }

        peerConnection.ondatachannel = event => {
            let dataChannel = event.channel;
            dataChannel.onopen = () => {
                document.getElementById("status").innerText = "🟢 Połączono!";
                console.log("✅ [Remote] Kanał danych otwarty!");
            };
            dataChannel.onmessage = event => {
                document.getElementById("chatMessages").value += "Caller: " + event.data + "\n";
            };
            window.dataChannel = dataChannel;
        };

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                console.log("📡 [Remote] Wygenerowano ICE Candidate:", event.candidate);
                socket.send(JSON.stringify({ type: "candidate", target: "caller", candidate: event.candidate }));
            }
        };

        function sendMessage() {
            let message = document.getElementById("messageInput").value;
            if (window.dataChannel.readyState === "open") {
                window.dataChannel.send(message);
                document.getElementById("chatMessages").value += "Me: " + message + "\n";
                document.getElementById("messageInput").value = "";
            }
        }
    </script>

</body>
</html>
